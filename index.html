<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together:On 실시간 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-800">📊 실시간 지표 대시보드</h1>
            <p class="text-slate-500 mt-2" id="last-updated">데이터 동기화 중...</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-10 border border-slate-100">
            <div id="dashboard-container" class="space-y-8">
                <p class="text-center text-slate-400">시트에서 데이터를 정밀 분석 중입니다...</p>
            </div>
        </div>
    </div>

    <script>
        // 언빈님의 실제 시트 CSV 경로
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxoHg0L06H0dgV1EMgq_Cljtxwqk_556XYXWciWj84o8msSIfkkdPnj2peZjuLA7zhg3Cr2ZvH4LX/pub?output=csv';

        async function fetchDashboardData() {
            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                const lines = csvData.split('\n');
                
                const container = document.getElementById('dashboard-container');
                container.innerHTML = '';

                lines.forEach(line => {
                    const cols = line.split(',');
                    // 데이터 정제: 항목명(A열), 현재(B열), 목표(C열)가 모두 유효한 경우만 처리
                    const name = cols[0]?.trim();
                    const currentStr = cols[1]?.replace(/[^0-9]/g, ''); // 숫자 외 문자 제거
                    const targetStr = cols[2]?.replace(/[^0-9]/g, '');
                    
                    const current = parseInt(currentStr);
                    const target = parseInt(targetStr);

                    // 유효한 숫자인 경우에만 그래프 생성 (제목줄이나 빈 줄 자동 패스)
                    if (name && !isNaN(current) && !isNaN(target) && target > 0) {
                        const percent = Math.min(Math.round((current / target) * 100), 100);
                        
                        let barColor = 'bg-orange-500';
                        if (percent >= 100) barColor = 'bg-emerald-500';
                        else if (percent < 50) barColor = 'bg-rose-500';

                        const cardHtml = `
                            <div>
                                <div class="flex justify-between mb-2 items-end">
                                    <span class="font-bold text-slate-700 text-lg">${name}</span>
                                    <span class="text-sm font-medium text-slate-500">
                                        <b class="text-slate-900 text-lg">${current.toLocaleString()}</b> / ${target.toLocaleString()} (${percent}%)
                                    </span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-5 shadow-inner">
                                    <div class="${barColor} h-5 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHtml;
                    }
                });

                document.getElementById('last-updated').innerText = `최종 동기화: ${new Date().toLocaleString()}`;

            } catch (error) {
                console.error('에러 발생:', error);
                document.getElementById('dashboard-container').innerHTML = '<p class="text-center text-red-500 font-bold">시트 데이터를 읽을 수 없습니다. 다시 시도해 주세요.</p>';
            }
        }

        fetchDashboardData();
        // 1분마다 자동으로 데이터 최신화
        setInterval(fetchDashboardData, 60000);
    </script>
</body>
</html>
