<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together:On 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="mb-8 flex items-center justify-between">
            <h1 class="text-3xl font-extrabold text-slate-800">📊 신카접수 월별 현황</h1>
            <span class="text-sm text-slate-500 bg-white px-3 py-1 rounded-full shadow-sm border border-slate-200" id="last-updated">업데이트 중...</span>
        </div>

        <div id="dashboard-container" class="space-y-8">
            <div class="bg-white rounded-2xl shadow-lg p-6 border border-slate-100">
                <p class="text-center text-slate-400 py-10">월별 데이터를 분류하고 있습니다...</p>
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxoHg0L06H0dgV1EMgq_Cljtxwqk_556XYXWciWj84o8msSIfkkdPnj2peZjuLA7zhg3Cr2ZvH4LX/pub?output=csv';

        const COL_NAME = 4;     // E열
        const COL_TARGET = 27;  // AB열 
        const COL_CURRENT = 34; // AI열 

        const targetDepts = ['교역자', '장로회', '자문회', '장년회', '부녀회', '청년회'];

        function parseCSV(text) {
            let lines = [], row = [], val = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i], next = text[i+1];
                if (c === '"' && next === '"') { val += '"'; i++; }
                else if (c === '"') { inQuotes = !inQuotes; }
                else if (c === ',' && !inQuotes) { row.push(val); val = ''; }
                else if ((c === '\n' || c === '\r') && !inQuotes) {
                    if (c === '\r' && next === '\n') i++;
                    row.push(val); lines.push(row); row = []; val = '';
                } 
                else { val += c; }
            }
            row.push(val); lines.push(row);
            return lines;
        }

        async function fetchDashboardData() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                const container = document.getElementById('dashboard-container');
                container.innerHTML = '';

                // 월별로 데이터를 모아둘 빈 보관함
                const monthlyData = {};
                let currentMonth = "진행 현황"; // 기본 제목

                rows.forEach(row => {
                    // 1. 몇 월인지 찾기 ('4월', '5월' 글자가 있는 줄을 찾음)
                    const rowString = row.join(' ');
                    const monthMatch = rowString.match(/(1[0-2]|[1-9])월/);
                    if (monthMatch && !rowString.includes('목표')) {
                        currentMonth = monthMatch[0]; // ex) "4월"
                    }

                    // 2. 부서 데이터 추출
                    if (row.length > COL_CURRENT) {
                        const name = (row[COL_NAME] || '').trim();
                        
                        if (targetDepts.includes(name)) {
                            // 해당 월의 보관함이 없으면 만들기
                            if (!monthlyData[currentMonth]) {
                                monthlyData[currentMonth] = [];
                            }

                            // 같은 월 안에 중복으로 들어가는 것만 방지
                            const isDuplicate = monthlyData[currentMonth].some(d => d.name === name);
                            
                            if (!isDuplicate) {
                                let targetStr = (row[COL_TARGET] || '0').replace(/[^0-9]/g, '');
                                let currentStr = (row[COL_CURRENT] || '0').replace(/[^0-9]/g, '');
                                
                                let target = parseInt(targetStr) || 0;
                                let current = parseInt(currentStr) || 0;
                                let percent = target > 0 ? Math.min(Math.round((current / target) * 100), 100) : (current > 0 ? 100 : 0);
                                
                                monthlyData[currentMonth].push({ name, target, current, percent });
                            }
                        }
                    }
                });

                // 3. 화면에 월별로 그리기
                if (Object.keys(monthlyData).length === 0) {
                    container.innerHTML = '<div class="bg-white rounded-2xl shadow-lg p-6"><p class="text-center text-orange-500 font-bold">부서 데이터를 찾을 수 없습니다.</p></div>';
                    return;
                }

                for (const [month, depts] of Object.entries(monthlyData)) {
                    let monthHtml = `
                    <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-slate-200">
                        <h2 class="text-2xl font-bold text-blue-800 mb-6 border-b-2 border-blue-100 pb-3">📅 ${month}</h2>
                        <div class="space-y-5">
                    `;

                    depts.forEach(d => {
                        let barColor = 'bg-orange-500';
                        if (d.percent >= 100) barColor = 'bg-emerald-500';
                        else if (d.percent < 50) barColor = 'bg-rose-500';
                        let displayPercent = d.target > 0 ? `${d.percent}%` : '-';

                        monthHtml += `
                            <div class="relative">
                                <div class="flex justify-between items-end mb-2">
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-700 text-lg w-16">${d.name}</span>
                                        <span class="text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-500 rounded">목표 ${d.target.toLocaleString()}</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-xl font-extrabold text-slate-800">${d.current.toLocaleString()}</span>
                                        <span class="text-sm font-medium text-slate-400 ml-1">명</span>
                                        <span class="text-sm font-bold ml-2 ${d.percent >= 100 ? 'text-emerald-600' : 'text-orange-500'}">(${displayPercent})</span>
                                    </div>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-4 shadow-inner">
                                    <div class="${barColor} h-4 rounded-full transition-all duration-1000" style="width: ${d.percent}%"></div>
                                </div>
                            </div>
                        `;
                    });

                    monthHtml += `</div></div>`;
                    container.innerHTML += monthHtml;
                }

                document.getElementById('last-updated').innerText = `최종 갱신: ${new Date().toLocaleTimeString()}`;

            } catch (error) {
                document.getElementById('dashboard-container').innerHTML = '<div class="bg-white rounded-2xl shadow-lg p-6"><p class="text-center text-red-500 font-bold">데이터를 분석하는 중 오류가 발생했습니다.</p></div>';
            }
        }

        fetchDashboardData();
        setInterval(fetchDashboardData, 60000); 
    </script>
</body>
</html>
